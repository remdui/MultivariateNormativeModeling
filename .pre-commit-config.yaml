repos:
  - repo: local
    hooks:
      - id: pyupgrade
        name: "Upgrade Python Syntax (pyupgrade)"
        entry: poetry run pyupgrade
        language: system
        types: [ python ]
        require_serial: true
        args: [ --py312-plus ]
  - repo: local
    hooks:
      - id: autoflake
        name: "Remove Unused Imports and Variables (autoflake)"
        entry: poetry run autoflake
        language: system
        types: [ python ]
        require_serial: true
        args: [ --remove-all-unused-imports, --remove-unused-variables, --in-place]
  - repo: local
    hooks:
      - id: isort
        name: "Import Sorting (isort)"
        entry: poetry run isort
        language: system
        types: [ python ]
        require_serial: true
  - repo: local
    hooks:
      - id: pydocstringformatter
        name: "Docstring Formatter (pydocstringformatter)"
        entry: poetry run pydocstringformatter
        language: system
        types: [ python ]
        require_serial: true
        args: [ --write ]
  - repo: local
    hooks:
      - id: black
        name: "Code Formatter 1/2 (black)"
        entry: poetry run black
        language: system
        types: [ python ]
        require_serial: true
  - repo: local
    hooks:
      - id: ruff
        name: "Code Formatter 2/2 (ruff)"
        entry: poetry run ruff format
        language: system
        types: [ python ]
        require_serial: true
  - repo: local
    hooks:
      - id: pylint
        name: "Static Code Analysis 1/2 (pylint)"
        entry: poetry run pylint
        language: system
        types: [ python ]
        require_serial: true
  - repo: local
    hooks:
      - id: ruff
        name: "Static Code Analysis 2/2 (ruff)"
        entry: poetry run ruff check
        language: system
        types: [ python ]
        require_serial: true
#  - repo: local
#    hooks:
#      - id: mypy
#        name: "Static Type Checker (mypy)"
#        entry: mypy ./src
#        language: system
#        types: [ python ]
#        require_serial: true
#        pass_filenames: false
  - repo: local
    hooks:
      - id: bandit
        name: "Security Linter (bandit)"
        entry: poetry run bandit
        language: system
        types: [ python ]
        require_serial: true
        args: ["--ini", ".bandit"]
#  - repo: local
#    hooks:
#      - id: xenon
#        name: "Code Complexity Checker (xenon)"
#        entry: xenon
#        language: system
#        types: [ python ]
#        require_serial: true
#        args: [-bD, -mD, -aD, ./src]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        name: "YAML file Checker"
      - id: end-of-file-fixer
        name: "End-of-File Fixer"
      - id: trailing-whitespace
        name: "Trailing Whitespace Checker"
  - repo: local
    hooks:
      - id: pytest
        name: "Unit Tests Fail/Pass (pytest)"
        entry: poetry run pytest tests
        language: system
        types: [ python ]
        require_serial: true
        always_run: true
        pass_filenames: false
  - repo: local
    hooks:
      - id: pytest-cov
        name: "Unit Tests Coverage (pytest-cov)"
        entry: poetry run pytest tests
        language: system
        types: [ python ]
        require_serial: true
        always_run: true
        pass_filenames: false
        args: [ --cov=src, --cov-report=xml, --cov-report=term, --cov-report=html, --cov-fail-under=5]
